# render.yaml — Infrastructure-as-code for Render.com
#
# Defines two services:
#   1. product-api     — Python/FastAPI web service (backend)
#   2. product-frontend — Static site (React/Vite build)
#
# Deploy: push this repo to GitHub, then connect it in the Render dashboard.
# Render reads this file and creates both services automatically.
#
# DATABASE_URL must be set manually in the Render dashboard (or via Render's
# "Environment Groups") because it contains credentials that must not be
# committed to source control.

services:

  # ── Backend: FastAPI + psycopg2 ────────────────────────────────────────
  - type: web
    name: product-api
    runtime: python
    region: oregon          # change to match your Neon DB region for low latency
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false         # value must be pasted manually in the Render dashboard
      - key: PYTHON_VERSION
        value: "3.12.0"

  # ── Frontend: Vite static build ────────────────────────────────────────
  - type: static
    name: product-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      # Set this to the URL of the product-api service above.
      # Render exposes it as https://<service-name>.onrender.com
      - key: VITE_API_URL
        sync: false         # paste the product-api URL here before deploying
    routes:
      # SPA fallback: serve index.html for all unknown paths
      - type: rewrite
        source: /*
        destination: /index.html
